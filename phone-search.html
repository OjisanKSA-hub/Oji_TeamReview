<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البحث برقم الهاتف</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-phone-alt"></i> البحث برقم الهاتف</h1>
            <a href="index.html" class="btn btn-secondary">
                <i class="fas fa-arrow-right"></i> العودة
            </a>
        </header>

        <!-- Phone Search Section -->
        <div class="team-code-section">
            <div class="code-input-container">
                <label for="phoneInput">رقم الهاتف:</label>
                <p class="search-note">يرجى كتابة الرقم بدون رمز الدولة +966 وبدون صفر في البداية</p>
                <div class="input-group">
                    <input type="text" id="phoneInput" placeholder="مثال: 536142021" />
                    <button id="searchBtn" class="btn btn-primary">
                        <i class="fas fa-search"></i> بحث
                    </button>
                </div>
            </div>
        </div>

        <!-- Shareable Link Section -->
        <div id="shareableLinkSection" class="team-code-section" style="display: none;">
            <div class="code-input-container">
                <label>رابط مباشر لهذا البحث:</label>
                <div class="input-group">
                    <input type="text" id="shareableLink" readonly style="min-width: 350px; direction: ltr; text-align: left;" />
                    <button id="copyLinkBtn" class="btn btn-secondary">
                        <i class="fas fa-copy"></i> نسخ الرابط
                    </button>
                </div>
            </div>
        </div>

        <!-- Results Section -->
        <div id="resultsSection" style="display: none;">

            <!-- National Jacket Order Info (shown when found in national_jacket_orders) -->
            <div id="nationalOrderInfo" class="team-info-section" style="display: none;">
                <div id="natStatus" class="form-status-label" style="margin-bottom: 15px;"></div>

                <div class="modern-section">
                    <div class="section-header">
                        <i class="fas fa-vest-patches"></i>
                        <h2>طلب جاكيت وطني</h2>
                    </div>
                    <div class="info-grid">
                        <div class="info-item">
                            <label>رقم الطلب:</label>
                            <span id="natOrderId"></span>
                        </div>
                        <div class="info-item">
                            <label>اسم العميل:</label>
                            <span id="natCustomerName"></span>
                        </div>
                        <div class="info-item">
                            <label>الهاتف:</label>
                            <span id="natPhone"></span>
                        </div>
                        <div class="info-item">
                            <label>حروف الواجهة:</label>
                            <span id="natFrontLetters"></span>
                        </div>
                        <div class="info-item">
                            <label>اسم الظهر:</label>
                            <span id="natBackName"></span>
                        </div>
                        <div class="info-item">
                            <label>تصميم الكم الأيمن:</label>
                            <span id="natRightSleeve"></span>
                        </div>
                        <div class="info-item">
                            <label>تصميم الكم الأيسر:</label>
                            <span id="natLeftSleeve"></span>
                        </div>
                        <div class="info-item">
                            <label>لون الجاكيت:</label>
                            <span id="natJacketColor"></span>
                        </div>
                        <div class="info-item">
                            <label>المقاس:</label>
                            <span id="natJacketSize"></span>
                        </div>
                    </div>
                    <div style="margin-top: 20px; text-align: center;">
                        <a id="natPreviewLink" href="#" target="_blank" class="btn btn-primary" style="display: none;">
                            <i class="fas fa-eye"></i> عرض تفاصيل الطلب الكاملة
                        </a>
                    </div>
                </div>
            </div>

            <!-- Team Leader Info -->
            <div id="teamInfo" class="team-info-section" style="display: none;">
                <div id="formStatusLabel" class="form-status-label" style="margin-bottom: 15px;"></div>

                <div class="team-leader-info modern-section">
                    <div class="section-header">
                        <i class="fas fa-user-tie"></i>
                        <h2>بيانات قائد المجموعة</h2>
                    </div>
                    <div class="info-grid">
                        <div class="info-item">
                            <label>الرمز:</label>
                            <span id="teamCode"></span>
                        </div>
                        <div class="info-item">
                            <label>الاسم:</label>
                            <span id="teamLeaderName"></span>
                        </div>
                        <div class="info-item">
                            <label>الهاتف:</label>
                            <span id="teamLeaderPhone"></span>
                        </div>
                    </div>
                </div>

                <div class="shipping-info modern-section">
                    <div class="section-header">
                        <i class="fas fa-shipping-fast"></i>
                        <h2>بيانات الشحن</h2>
                    </div>
                    <div class="info-grid">
                        <div class="info-item">
                            <label>البلد:</label>
                            <span id="teamCountry"></span>
                        </div>
                        <div class="info-item">
                            <label>المدينة:</label>
                            <span id="teamCity"></span>
                        </div>
                        <div class="info-item">
                            <label>المربع:</label>
                            <span id="teamSquare"></span>
                        </div>
                        <div class="info-item">
                            <label>الشارع:</label>
                            <span id="teamStreet"></span>
                        </div>
                        <div class="info-item">
                            <label>بيانات شحن اضافية:</label>
                            <span id="teamAdditionalInfo"></span>
                        </div>
                    </div>
                </div>

                <div class="order-info modern-section">
                    <div class="section-header">
                        <i class="fas fa-shopping-cart"></i>
                        <h2>بيانات الطلب</h2>
                    </div>
                    <div class="info-grid">
                        <div class="info-item">
                            <label>عدد الأعضاء:</label>
                            <span id="teamMembers"></span>
                        </div>
                        <div class="info-item">
                            <label>خيار الطلب:</label>
                            <span id="teamOrderOption"></span>
                        </div>
                        <div class="info-item">
                            <label>الحالة:</label>
                            <span id="teamStatus"></span>
                        </div>
                        <div class="info-item">
                            <label>رابط المجلد Google Drive:</label>
                            <div class="info-item-with-button">
                                <button id="openFolderURLBtn" class="btn btn-primary btn-sm" style="display: none;">
                                    <i class="fas fa-external-link-alt"></i> فتح المجلد
                                </button>
                            </div>
                        </div>
                        <div class="info-item">
                            <label>إجمالي السعر:</label>
                            <span id="teamTotalPrice"></span>
                        </div>
                        <div class="info-item">
                            <label>ملاحظات:</label>
                            <span id="teamNotes"></span>
                        </div>
                        <div class="info-item">
                            <label>جاهز للشحن:</label>
                            <span id="teamShippingReady"></span>
                        </div>
                    </div>
                </div>

                <!-- Team Members Section -->
                <div class="team-members-section">
                    <h2>أعضاء المجموعة</h2>
                    <div id="teamMembersList">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Member Details Modal -->
    <div id="memberModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="memberModalTitle">بيانات طلب العضو</h2>
                <span class="close" id="memberModalClose">&times;</span>
            </div>
            <div class="modal-body">
                <div id="memberDetails"></div>
            </div>
            <div class="modal-footer">
                <button id="closeMemberModalBtn" class="btn btn-secondary">
                    <i class="fas fa-times"></i> إغلاق
                </button>
            </div>
        </div>
    </div>

    <!-- Loading overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i>
            <p>جاري البحث...</p>
        </div>
    </div>

    <!-- Notification -->
    <div id="notification" class="notification"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="phone-search.js"></script>
</body>

</html>
